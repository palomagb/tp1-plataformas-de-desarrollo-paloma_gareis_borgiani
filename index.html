<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Care Tracker - TP1</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex flex-col font-sans">

    <header class="bg-indigo-600 text-white p-6 shadow-md">
        <div class="container mx-auto">
            <h1 class="text-2xl font-bold">🐾 Pet Care Tracker</h1>
            <p class="text-sm opacity-80">Checklist Diario de Cuidados</p>
        </div>
    </header>

    <main class="container mx-auto p-4 flex-grow max-w-2xl">

        <section class="bg-white p-6 rounded-lg shadow-sm mb-6">
            <h2 class="text-lg font-semibold mb-4 text-slate-700">Añadir Cuidado</h2>
            <form id="task-form" class="flex gap-2">
                <input type="text" id="task-input" placeholder="Ej: Limpiar fuente de agua..."
                    class="flex-grow border border-slate-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <button type="submit"
                    class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 transition">
                    Agregar
                </button>
            </form>
        </section>

        <div class="mb-4">
            <input type="text" id="search-input" placeholder="Buscar tarea..."
                class="w-full border border-slate-300 rounded-md p-2 text-sm">
        </div>

        <section class="bg-white rounded-lg shadow-sm overflow-hidden">
            <ul id="task-list" class="divide-y divide-slate-200">
            </ul>
        </section>

    </main>

    <footer class="bg-slate-800 text-slate-400 p-6 text-center text-sm">
        <p>Plataformas de Desarrollo - Análisis de Sistemas</p>
        <p class="mt-1">Paloma Gareis Borgiani - Escuela Da Vinci</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
