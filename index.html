<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Care Tracker - TP1</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#fff7ea] min-h-screen flex flex-col font-sans text-[#333333]">

    <header class="bg-[#9cb49a] p-8 shadow-sm">
        <div class="container mx-auto flex items-center justify-center gap-6">

            <img src="img/logo-patita.png" alt="Logo Pet Care" class="h-16 w-auto">

            <div class="flex flex-col">
                <h1 class="text-3xl font-bold text-white tracking-tight">Pet Care Tracker</h1>
                <p class="text-[#fff7ea] opacity-90 mt-1 italic text-sm">Gestionando el bienestar de tus mascotas</p>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 flex-grow max-w-2xl">
        <section class="bg-white p-8 rounded-3xl shadow-sm border border-[#9cb49a]/20 -mt-10 relative z-10">
            <form id="task-form" class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="task-input" placeholder="Colocar agua fresca..."
                    class="flex-grow border-2 border-[#fff7ea] bg-[#fff7ea]/30 rounded-2xl p-4 focus:outline-none focus:border-[#9cb49a] transition-all">
                <button type="submit"
                    class="bg-[#9cb49a] text-white px-10 py-4 rounded-2xl font-bold hover:brightness-95 transition-all shadow-md">
                    Añadir
                </button>
            </form>
        </section>

        <div class="mt-8 mb-4 px-2 relative flex items-center">
            <img src="img/lupa.png" alt="Buscar" class="absolute ml-3 h-4 w-4 opacity-60">

            <input type="text" id="search-input" aria-label="Buscar tareas" placeholder="Buscar cuidado..."
                class="w-full bg-white/50 border-b-2 border-[#9cb49a] py-2 pl-10 pr-2 text-sm focus:outline-none text-[#333333] placeholder:text-[#9cb49a]/60">
        </div>

        <ul id="task-list" class="space-y-3">
        </ul>
    </main>

    <footer class="bg-[#9cb49a] text-[#fff7ea] py-2 mt-12">
        <div class="container mx-auto text-center px-4">
            <div class="flex justify-center mb-2">
                <img src="img/logo-patita.png" alt="Pet Care Logo" class="h-8 w-auto opacity-80 brightness-200">
            </div>

            <div class="space-y-1">

                <p class="text-sm opacity-80">Paloma Gareis Borgiani — Escuela Da Vinci</p>
            </div>

            <div class="h-[1px] w-16 bg-[#fff7ea]/30 mx-auto my-4"></div>

            <p class="text-[10px] uppercase tracking-widest opacity-60">
                © 2026 Pet Care Tracker
            </p>
        </div>
    </footer>

    <div id="toast"
        class="fixed top-5 left-1/2 -translate-x-1/2 z-50 pointer-events-none opacity-0 transition-all duration-500">
        <div class="bg-white border-l-4 border-[#9cb49a] shadow-2xl rounded-r-2xl p-5 flex items-center gap-4">

            <img src="img/advertencia.png" alt="Alerta" class="h-6 w-6 opacity-100">

            <div>
                <p class="text-[#9cb49a] font-black text-sm uppercase tracking-wider">¡Atención!</p>
                <p id="toast-message" class="text-[#333333]/70 text-xs font-medium italic"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
